<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:rgba(2,6,23,0.85);
  backdrop-filter: blur(10px);
  padding:20px;
  border-right:1px solid #1e293b;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  color:#8b5cf6;
  margin-bottom:20px;
  font-size:20px;
}

.nav-btn{
  padding:12px;
  margin:6px 0;
  background:transparent;
  border:1px solid #334155;
  color:white;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  text-align:left;
}

.nav-btn:hover{
  background:#8b5cf6;
  transform:translateX(5px);
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  overflow-y:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.header h1{
  font-size:28px;
  animation:fadeIn 0.8s ease;
}

.profile{
  padding:10px 18px;
  border-radius:12px;
  background:rgba(2,6,23,0.7);
  border:1px solid #334155;
  font-weight:600;
}

/* GAMES GRID */
.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.card{
  background:rgba(2,6,23,0.75);
  border:1px solid #334155;
  border-radius:16px;
  padding:15px;
  text-align:center;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px rgba(139,92,246,0.5);
  border-color:#8b5cf6;
}

.card img{
  width:100%;
  border-radius:12px;
  height:120px;
  object-fit:cover;
}

.card h3{
  margin:10px 0;
}

.play-btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#15803d);
  color:white;
  cursor:pointer;
  transition:0.3s;
  font-weight:600;
}

.play-btn:hover{
  filter:brightness(1.2);
  transform:scale(1.03);
}

/* LOBBY */
.lobby{
  margin-top:40px;
  background:rgba(2,6,23,0.75);
  padding:20px;
  border-radius:16px;
  border:1px solid #334155;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.lobby button{
  padding:12px 20px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  transition:0.3s;
}

.lobby button:hover{
  transform:scale(1.05);
}

/* ANIMAÇÕES */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* RESPONSIVO */
@media(max-width:768px){
  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    flex-direction:row;
    overflow-x:auto;
  }

  .nav-btn{
    flex:1;
    text-align:center;
  }

  .games{
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎮 Plataforma</h2>

  <button class="nav-btn">Menu</button>
  <button class="nav-btn">Perfil</button>
  <button class="nav-btn">Amigos</button>
  <button class="nav-btn">Ranking</button>
  <button class="nav-btn" onclick="logout()">Sair</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h1>Bem-vindo à Arena 🎮</h1>
    <div class="profile" id="userBox">Player</div>
  </div>

  <!-- JOGOS -->
  <div class="games">

    <div class="card">
      <img src="https://i.imgur.com/2RXYO2v.png">
      <h3>Damas</h3>
      <button class="play-btn" onclick="play('dama')">JOGAR</button>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/n6bU0Jk.png">
      <h3>Xadrez</h3>
      <button class="play-btn" onclick="play('xadrez')">JOGAR</button>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/j6Y9X8K.png">
      <h3>Dominó</h3>
      <button class="play-btn" onclick="play('domino')">JOGAR</button>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/2X6sY3C.png">
      <h3>Velha</h3>
      <button class="play-btn" onclick="play('velha')">JOGAR</button>
    </div>

  </div>

  <!-- LOBBY -->
  <div class="lobby">
    <div>
      <h2>🎯 Lobby Multiplayer</h2>
      <p>Jogue em tempo real com Socket.IO</p>
    </div>

    <button onclick="goLobby()">ENTRAR →</button>
  </div>

</div>

<script>

// USER
const user = localStorage.getItem("username");
if(user){
  document.getElementById("userBox").innerText = user;
}

// ROTAS (alinhado com tua estrutura)
const gamesRoutes = {
  dama: "games/dama.html",
  xadrez: "games/xadrez.html",
  domino: "games/domino.html",
  velha: "games/velha.html"
};

function play(game){
  const route = gamesRoutes[game];

  if(!route){
    alert("Jogo não encontrado!");
    return;
  }

  // futuro: integrar lobbySocket antes de entrar no jogo
  window.location.href = "lobbySocket";
}

function goLobby(){
  // futuro: socket.emit("joinLobby")
  window.location.href = "lobby.html";
}

function logout(){
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

</script>

</body>
</html>
