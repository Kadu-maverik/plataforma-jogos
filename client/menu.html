<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Game Menu</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  display:flex;
  height:100vh;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:20px;
  border-right:1px solid #1e293b;
}

.sidebar h2{
  margin-bottom:20px;
  color:#8b5cf6;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:transparent;
  border:1px solid #334155;
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#8b5cf6;
}

/* CONTEÚDO */
.main{
  flex:1;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.profile{
  background:#020617;
  padding:10px 20px;
  border-radius:10px;
  border:1px solid #334155;
}

/* GRID DE JOGOS */
.games{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:#020617;
  border:1px solid #334155;
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px #8b5cf6;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

.card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#22c55e,#15803d);
  color:white;
  cursor:pointer;
}

/* LOBBY */
.lobby{
  margin-top:40px;
  background:#020617;
  padding:20px;
  border-radius:15px;
  border:1px solid #334155;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.lobby button{
  padding:10px 20px;
  background:gold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎮 Game</h2>
  <button>Menu</button>
  <button>Perfil</button>
  <button>Amigos</button>
  <button>Ranking</button>
  <button onclick="logout()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="main">

  <div class="header">
    <h1>Bem-vindo!</h1>
    <div class="profile" id="userBox">Player</div>
  </div>

  <!-- JOGOS -->
  <div class="games">

    <div class="card">
      <img src="https://i.imgur.com/2RXYO2v.png">
      <h3>Dama</h3>
      <button onclick="play('dama')">JOGAR</button>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/n6bU0Jk.png">
      <h3>Xadrez</h3>
      <button onclick="play('xadrez')">JOGAR</button>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/j6Y9X8K.png">
      <h3>Dominó</h3>
      <button onclick="play('domino')">JOGAR</button>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/2X6sY3C.png">
      <h3>Velha</h3>
      <button onclick="play('velha')">JOGAR</button>
    </div>

  </div>

  <!-- LOBBY -->
  <div class="lobby">
    <div>
      <h2>Entrar no Lobby</h2>
      <p>Jogue com amigos online</p>
    </div>

    <button onclick="goLobby()">IR PARA O LOBBY →</button>
  </div>

</div>

<script>

// pegar username do login
const user = localStorage.getItem("username");

if(user){
  document.getElementById("userBox").innerText = user;
}

// funções
const gamesRoutes = {
  dama: "games/dama/lobby.html",
  xadrez: "games/xadrez/lobby.html",
  domino: "games/domino/lobby.html",
  velha: "games/velha/lobby.html"
};

function play(game){
  window.location.href = gamesRoutes[game];
}


function goLobby(){
  alert("Entrando no lobby...");
}

function logout(){
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

</script>

</body>
</html>
