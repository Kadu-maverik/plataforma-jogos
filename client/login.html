<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Game Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1a1f2e, #0d0f16);
    overflow:hidden;
}

/* Fundo animado */
.background{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.circle{
    position:absolute;
    border-radius:50%;
    background: rgba(0, 255, 200, 0.08);
    animation: float 10s infinite ease-in-out;
}

.circle:nth-child(1){ width:200px; height:200px; top:10%; left:15%; }
.circle:nth-child(2){ width:300px; height:300px; bottom:10%; right:10%; animation-duration:14s; }
.circle:nth-child(3){ width:120px; height:120px; top:60%; left:70%; animation-duration:8s; }

@keyframes float{
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-30px); }
    100%{ transform: translateY(0px); }
}

/* Caixa login */
.login-container{
    position:relative;
    z-index:2;
    width:380px;
    padding:40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform: translateY(20px); }
    to{ opacity:1; transform: translateY(0); }
}

h2{
    color:#00ffd5;
    text-align:center;
    margin-bottom:25px;
    font-weight:700;
    letter-spacing:1px;
}

.input-box{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px 15px;
    border:none;
    outline:none;
    border-radius:10px;
    background: rgba(255,255,255,0.08);
    color:#fff;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    background: rgba(0,255,213,0.1);
    box-shadow:0 0 10px rgba(0,255,213,0.4);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(90deg, #00ffd5, #00a3ff);
    color:#000;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    transform: scale(1.05);
    box-shadow:0 10px 20px rgba(0,255,213,0.3);
}

.extra{
    margin-top:15px;
    text-align:center;
    font-size:13px;
    color:#aaa;
}

.extra a{
    color:#00ffd5;
    text-decoration:none;
}

.error{
    color:#ff4d4d;
    font-size:12px;
    text-align:center;
    margin-top:10px;
    display:none;
}
</style>
</head>

<body>

<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="login-container">
    <h2>LOGIN</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">Entrar</button>

    <div class="error" id="error">Credenciais inválidas</div>

    <div class="extra">
        Não tens conta? <a href="register.html">Registar</a>
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    if(!username || !password){
        error.innerText = "Preenche todos os campos";
        error.style.display = "block";
        return;
    }

    try {
        // 🔗 FUTURO BACKEND (ligação com auth/login.js via API)
        const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        if(!res.ok){
            throw new Error("Falha no login");
        }

        const data = await res.json();

        // 💾 guardar sessão
        localStorage.setItem("user", JSON.stringify({
            username: data.username,
            token: data.token
        }));

        // 🚀 redirecionar para menu
        window.location.href = "menu.html";

    } catch (err) {
        console.log(err);

        // 🔄 fallback (modo offline / dev)
        if(username.length >= 3 && password.length >= 3){

            localStorage.setItem("user", JSON.stringify({
                username: username,
                token: "dev-token"
            }));

            window.location.href = "menu.html";
        } else {
            error.innerText = "Credenciais inválidas";
            error.style.display = "block";
        }
    }
}
</script>

</body>
</html>
