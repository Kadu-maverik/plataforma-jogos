<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e1e2f;
            color: white;
            font-family: Arial;
        }

        .box {
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Login</h1>

        <input placeholder="Email"><br>
        <input placeholder="Password" type="password"><br>

        <button onclick="login()">Entrar</button>
    </div>

    <script>
        function login() {
            window.location.href = "/";
        }
    </script>
</body>
</html>
