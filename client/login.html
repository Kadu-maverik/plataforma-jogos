<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
font-family:Arial;
}

.box{
text-align:center;
}

input{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
cursor:pointer;
}
</style>
</head>

<body>
<div class="box">
<h2>Plataforma de Jogos</h2>

<input id="user" placeholder="Username">

<br>

<button onclick="login()">Entrar</button>
</div>

<script>
function login(){
const user = document.getElementById("user").value;

if(!user){
alert("Escreve username");
return;
}

localStorage.setItem("user", user);

window.location.href = "/menu.html";
}
</script>

</body>
</html>
