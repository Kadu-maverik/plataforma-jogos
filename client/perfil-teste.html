<!DOCTYPE html>
<html>

<head>
<title>Perfil</title>
</head>


<body>


<h1>Meu Perfil</h1>


<button onclick="carregarPerfil()">
Ver perfil
</button>


<pre id="resultado"></pre>



<script>


async function carregarPerfil(){


let token =
localStorage.getItem("token");



let resposta = await fetch(
"/api/user/perfil",
{

headers:{

"Authorization":
"Bearer " + token

}

});


let dados =
await resposta.json();



document.getElementById(
"resultado"
).textContent =
JSON.stringify(
dados,
null,
2
);



}


</script>


</body>

</html>
