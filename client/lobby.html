<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobby | Game Platform</title>

<script src="/socket.io/socket.io.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Inter', sans-serif;
}

body{
    background: radial-gradient(circle at top, #1b1f3a, #0b0d1a);
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER */
.lobby-container{
    width:90%;
    max-width:1000px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
}

/* PAINEL */
.panel{
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    padding:20px;
    backdrop-filter: blur(10px);
}

/* TITULO */
h2{
    margin-bottom:15px;
    font-size:20px;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* BOTÕES */
button{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.primary{ background:#4f46e5; color:#fff; }
.success{ background:#10b981; color:#fff; }
.danger{ background:#ef4444; color:#fff; }

/* LISTA */
.list{
    margin-top:10px;
    max-height:200px;
    overflow:auto;
}

.player{
    padding:8px;
    margin-bottom:5px;
    background:rgba(255,255,255,0.05);
    border-radius:6px;
}

/* STATUS */
.status{
    margin-top:10px;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:8px;
    text-align:center;
}
</style>
</head>

<body>

<div class="lobby-container">

    <!-- CRIAR / ENTRAR SALA -->
    <div class="panel">
        <h2>🎮 Lobby Multiplayer</h2>

        <input id="username" placeholder="Nome de utilizador">
        <input id="roomId" placeholder="ID da sala">

        <button class="primary" onclick="createRoom()">Criar Sala</button>
        <button class="success" onclick="joinRoom()">Entrar na Sala</button>

        <div class="status" id="status">Aguardando ação...</div>
    </div>

    <!-- JOGADORES -->
    <div class="panel">
        <h2>👥 Jogadores na Sala</h2>
        <div id="players" class="list"></div>

        <button class="danger" onclick="leaveRoom()">Sair da Sala</button>
    </div>

</div>

<script>
const socket = io();

let currentRoom = null;

/* CRIAR SALA */
function createRoom(){
    const username = document.getElementById("username").value;
    const roomId = document.getElementById("roomId").value;

    if(!username || !roomId){
        alert("Preenche todos os campos!");
        return;
    }

    socket.emit("createRoom", { username, roomId });

    currentRoom = roomId;
    setStatus("Sala criada: " + roomId);
}

/* ENTRAR NA SALA */
function joinRoom(){
    const username = document.getElementById("username").value;
    const roomId = document.getElementById("roomId").value;

    if(!username || !roomId){
        alert("Preenche todos os campos!");
        return;
    }

    socket.emit("joinRoom", { username, roomId });

    currentRoom = roomId;
    setStatus("Entrou na sala: " + roomId);
}

/* SAIR DA SALA */
function leaveRoom(){
    if(!currentRoom) return;

    socket.emit("leaveRoom", { roomId: currentRoom });

    document.getElementById("players").innerHTML = "";
    setStatus("Saiu da sala");

    currentRoom = null;
}

/* ATUALIZAR LISTA DE JOGADORES */
socket.on("roomPlayers", (players) => {
    const container = document.getElementById("players");
    container.innerHTML = "";

    players.forEach(p => {
        const div = document.createElement("div");
        div.className = "player";
        div.innerText = p;
        container.appendChild(div);
    });
});

/* INICIAR JOGO */
socket.on("startGame", () => {
    setStatus("Jogo a iniciar...");

    setTimeout(() => {
        window.location.href = "/menu.html";
    }, 1500);
});

/* STATUS */
function setStatus(text){
    document.getElementById("status").innerText = text;
}
</script>

</body>
</html>
